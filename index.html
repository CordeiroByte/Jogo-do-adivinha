<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="CordeiroByte">
    <title>Jogo: Descubra o Número</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <div id="cardbox">
        <h1>Descubra o número</h1> 
        <div id="cardformulario">
            <form action=""> 
                <p>
                    <label for="inNum">Número:</label>
                    <input type="number" name="inNum" id="inNum" max="100" min="1" required autofocus>
                    <input type="submit" value="Apostar" id="btSubmit">
                    <input type="button" value="Jogar Novamente" id="btNovo" class="oculta">
                </p>
            </form>
        </div>
        <div id="cardrespostas">
            <h3 id="outResp1">Erros: 0</h3>
            <h3 id="outResp2">Chances: 6</h3>
            <h2 id="outDicas" class="italico">Dica: é um número entre 1 e 100</h2>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
